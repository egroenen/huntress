services:
  edarr:
    build:
      context: .
      dockerfile: Containerfile
    image: edarr:local
    container_name: edarr
    restart: unless-stopped
    ports:
      - '47892:47892'
    environment:
      CONFIG_PATH: '/config/config.yaml'
    volumes:
      - ./config:/config:ro
      - ./data:/data
