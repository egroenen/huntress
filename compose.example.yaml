services:
  edarr:
    build:
      context: .
      dockerfile: Containerfile
    image: edarr:local
    container_name: edarr
    restart: unless-stopped
    ports:
      - '47892:47892'
    environment:
      APP_SESSION_SECRET: 'replace-me'
      SONARR_API_KEY: 'replace-me'
      RADARR_API_KEY: 'replace-me'
      PROWLARR_API_KEY: 'replace-me'
      TRANSMISSION_RPC_USERNAME: 'replace-me'
      TRANSMISSION_RPC_PASSWORD: 'replace-me'
      CONFIG_PATH: '/config/config.yaml'
    volumes:
      - ./config:/config:ro
      - ./data:/data
